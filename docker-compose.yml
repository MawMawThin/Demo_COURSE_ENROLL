services:
  # MySQL Database Service
  mysql-db:
    image: mysql:8.0
    container_name: course_enroll_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: course_enroll_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_course_data:/var/lib/mysql

  # Spring Boot Application Service
  app:
    build: .
    container_name: course_enroll_app
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/course_enroll_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - mysql-db

volumes:
  mysql_course_data: